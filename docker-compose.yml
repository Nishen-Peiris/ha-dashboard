services:
  ha-dashboard-ui:
    container_name: ha-dashboard
    build:
      context: .
      dockerfile: Dockerfile
    image: ha-dashboard:local
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      PORT: "8080"
      HOST: "0.0.0.0"
      HA_DASHBOARD_BASE_URL: "${HA_DASHBOARD_BASE_URL:?Set HA_DASHBOARD_BASE_URL}"
      HA_DASHBOARD_FALLBACK_URLS: "${HA_DASHBOARD_FALLBACK_URLS:-}"
      HA_DASHBOARD_TOKEN: "${HA_DASHBOARD_TOKEN:?Set HA_DASHBOARD_TOKEN}"
      # Optional HTTPS support inside the container:
      # HTTPS_CERT_FILE: "/app/certs/lan-cert.pem"
      # HTTPS_KEY_FILE: "/app/certs/lan-key.pem"
    # Uncomment if you want to use the bundled cert files:
    # volumes:
    #   - ./certs:/app/certs:ro
